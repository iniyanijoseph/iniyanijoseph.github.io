name: Weekly Digest

on:
  schedule:
    - cron: "30 19 * * SUN"  # Sunday 2:30pm America/Chicago (19:30 UTC, adjust for DST)
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt
        working-directory: digest

      - run: python digest.py
        working-directory: digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

      - run: |
          ls -la
          if [ -f index.typ ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.typ
            git diff --quiet --cached || git commit -m "Update index.typ"
            git push
          else
            echo "index.typ not found, skipping commit"
            exit 1
          fi
        working-directory: digest

      - run: gh workflow run build.yml --ref "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
