        <h3>Ingredients</h3>
        <ul>
          <li>6-8 apples</li>
          <li>80mL apple cider vinegar</li>
          <li>30g warm spices</li>
          <li>sugar (optional)</li>
        </ul>
        <h3>Directions</h3>
        <ul>
          <li>Core, peel, and dice apples</li>
          <li>Boil apples in vinegar and spices with sugar until fork-tender</li>
          <li>Puree or mash until desired texture</li>
        </ul>
